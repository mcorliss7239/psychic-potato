<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Birthday Blitz Poll</title>
  <style>
    /* Basic styling for the poll */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
    }
    .poll-option {
      display: inline-block;
      margin: 20px;
      cursor: pointer;
      border: 5px solid transparent; /* default border */
      border-radius: 10px;
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .poll-option.selected {
      transform: scale(1.05);
      /* border-color will be set dynamically via JS */
    }
    .poll-option img {
      width: 200px;          /* set a fixed width */
      height: auto;          /* preserve aspect ratio */
      border-radius: 10px;   /* optional: rounded corners */
      display: block;        /* avoid inline spacing issues */
      margin: 0 auto 10px;   /* center image and add spacing below */
      object-fit: contain;   /* make sure the image scales nicely */
    }
    button { margin-top: 30px; padding: 10px 20px; font-size: 18px; }
    .bar-container {
      background: #ddd;
      border-radius: 5px;
      height: 25px;
      margin-bottom: 15px;
      overflow: hidden;
    }
   
    .bar {
      height: 25px;
      line-height: 25px;
      color: white;
      padding-left: 10px;
      border-radius: 5px;
      transition: width 0.5s ease;
      text-align: left;
      white-space: nowrap;
    }

    #resultsG .bar {
      background-color: #4CAF50; /* Team G green */
    }
    
    #resultsL .bar {
      background-color: #2196F3; /* Team L blue */
    }
    
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .results-wrapper {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      flex-wrap: wrap; /* makes it stack on small screens */
    }
    
    .team-results {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .team-results:nth-child(1) {
      border-top: 5px solid #4CAF50; /* Team G */
    }
    
    .team-results:nth-child(2) {
      border-top: 5px solid #2196F3; /* Team L */
    }
    .team-button {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, border 0.2s;
      user-select: none;
      border: 3px solid transparent; /* default border */
    }
    
    .team-button input {
      display: none; /* hide default radio */
    }
    
    .team-button input:checked + span {
      border: 3px solid yellow; /* bold border for selected */
      border-radius: 8px;        /* match the button corners */
      transform: scale(1.05);    /* subtle grow effect optional */
    }
  </style>
</head>
  
<body>

<div class="container">

  <h2 style="font-family: 'Comic Sans MS', cursive, sans-serif; color: #ff5722; font-size: 48px; line-height: 1.2;">
    🎉 Birthday Blitz Poll! 🎉
  </h2>

  <div id="teamSelection">
    <label class="team-button" style="background-color: #4CAF50;">
      <input type="radio" name="team" value="G" checked>
      <span>Team Grayson</span>
    </label>
    
    <label class="team-button" style="background-color: #2196F3;">
      <input type="radio" name="team" value="L">
      <span>Team Lennox</span>
    </label>
  </div>
    
  <form id="pollForm">
    <div class="poll-option" data-value="1">
      <img src="https://d34mvw1if3ud0g.cloudfront.net/35210/Skoolzy-Peg-Board-Set_20250418-044501_full.jpeg" alt="Option 1">
      <div class="option-title">
        <a href="https://www.amazon.com/Skoolzy-Peg-Board-Set-Occupational/dp/B00W8FVMNO?tag=thewire06-20" target="_blank">
          Skoolzy’s Peg Board Set
        </a>
      </div>
    </div>
  
    <div class="poll-option" data-value="2">
      <img src="https://cdn.thewirecutter.com/wp-content/media/2023/12/giftsfor2yearolds-2048px-stackingrobots.jpg?width=1456&quality=60&crop=2048:1366&auto=webp" alt="Stacking Robots">
      <div class="option-title">
        <a href="https://www.walmart.com/ip/Schylling-Wooden-Stacking-Robot-Figures/50563176" target="_blank">
          Schylling’s Wooden Stacking Robots
        </a>
      </div>
    </div>
  
    <div class="poll-option" data-value="3">
      <img src="https://cdn.thewirecutter.com/wp-content/media/2023/12/giftsfor2yearolds-2048px-dumptruck.jpg?width=1456&quality=60&crop=2048:1365&auto=webp" alt="Green Toys Dump Truck">
      <div class="option-title">
        <a href="https://www.amazon.com/Green-Toys-Dump-Truck-Yellow/dp/B001Q3KU9Q?tag=thewire06-20" target="_blank">
          Green Toys Dump Truck
        </a>
      </div>
    </div>
  
    <div class="poll-option" data-value="4">
      <img src="https://m.media-amazon.com/images/I/714NIH2CVFL._AC_SL1500_.jpg" alt="Melissa & Doug Pet Vet Play Set">
      <div class="option-title">
        <a href="https://www.amazon.com/dp/B074L8RV1F/?tag=thewire06-20" target="_blank">
          Melissa & Doug Pet Vet Play Set
        </a>
      </div>
    </div>
  
    <div class="poll-option" data-value="5">
      <img src="https://www.lego.com/cdn/cs/set/assets/blte17039c195e043cb/10427_Box1_v39.png?format=webply&fit=bounds&quality=70&width=800&height=800&dpr=1.5" alt="DUPLO Interactive Adventure Train">
      <div class="option-title">
        <a href="https://www.lego.com/en-us/product/interactive-adventure-train-10427" target="_blank">
          DUPLO Interactive Adventure Train
        </a>
      </div>
    </div>
  
    <div class="poll-option" data-value="6">
      <img src="https://cdn.thewirecutter.com/wp-content/media/2022/11/kidsgiftguide-2048px-playandexplorerocket.jpg?width=1456&quality=60&crop=2048:2048&auto=webp" alt="Lakeshore Play & Explore Rocket">
      <div class="option-title">
        <a href="https://www.lakeshorelearning.com/products/dramatic-play/cars-trucks-trains/play-explore-rocket/p/PP779/" target="_blank">
          Lakeshore Play & Explore Rocket
        </a>
      </div>
    </div>
  
    <br>
    <button type="submit">Vote</button>
    <br>
    <button type="button" onclick="resetVotes()" style="background:#f44336; color:white; padding:10px 20px; border:none; border-radius:5px;">
      Reset Votes
    </button>
  </form>
  
  <div class="results-wrapper">

  <div class="team-results">
    <h3>Team Grayson</h3>
    <div id="resultsG"></div>
  </div>

  <div class="team-results">
    <h3>Team Lennox</h3>
    <div id="resultsL"></div>
  </div>

</div>
  
</div>

<!-- 1️⃣ Firebase Config and Initialization -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, runTransaction, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  // Your Firebase config goes here
  const firebaseConfig = {
    apiKey: "AIzaSyAkgrH8-Q6kxsKAf38iZwnHsUfmBlOrz6E",
    authDomain: "birthday-backend-c1a72.firebaseapp.com",
    projectId: "birthday-backend-c1a72",
    storageBucket: "birthday-backend-c1a72.firebasestorage.app",
    messagingSenderId: "547728504413",
    appId: "1:547728504413:web:32c97b5624eacf1f6c3fb4",
    measurementId: "G-809TGWJ5QP"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

// --- Auto-initialize votes for Teams G and L with 6 options ---
  const options = [1, 2, 3, 4, 5, 6];
  const teams = ['G', 'L'];
  
  teams.forEach(async team => {
    options.forEach(async option => {
      const docRef = doc(db, 'votes', `${team}_${option}`);
      const docSnap = await getDoc(docRef);
      if (!docSnap.exists()) {
        await setDoc(docRef, { count: 0 });
      }
    });
  });

    window.resetVotes = async function() {
      if (!confirm("Are you sure you want to reset all votes?")) return;
    
      const options = [1,2,3,4,5,6];
      const teams = ['G','L'];
    
      for (let team of teams) {
        for (let option of options) {
          const ref = doc(db, "votes", `${team}_${option}`);
          await setDoc(ref, { count: 0 });
        }
      }
    
      showResults();  // refresh the bar chart
    };
  // 2️⃣ Poll JS
  const pollOptions = document.querySelectorAll('.poll-option');
  const teamColors = { G: '#4CAF50', L: '#2196F3' };
  
  // Click to toggle selection
  pollOptions.forEach(option => {
    option.addEventListener('click', () => {
      const selectedTeam = document.querySelector('input[name="team"]:checked').value;
  
      // toggle selection class
      option.classList.toggle('selected');
  
      // set border color dynamically
      if (option.classList.contains('selected')) {
        option.style.borderColor = teamColors[selectedTeam];
      } else {
        option.style.borderColor = 'transparent';
      }
    });
  });
  
  // Reset selections when team changes
  const teamRadios = document.querySelectorAll('input[name="team"]');
  teamRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      pollOptions.forEach(option => {
        option.classList.remove('selected');
        option.style.borderColor = 'transparent';
      });
    });
  });
  
  // Update outlines dynamically
  function updateSelectedColors() {
    const selectedTeam = document.querySelector('input[name="team"]:checked').value;
    pollOptions.forEach(option => {
      if(option.classList.contains('selected')) {
        option.style.borderColor = teamColors[selectedTeam];
      }
    });
  }
    
  // ✅ Make links clickable without toggling selection
  document.querySelectorAll('.option-title a').forEach(link => {
    link.addEventListener('click', e => e.stopPropagation());
  });
  
  const pollForm = document.getElementById('pollForm');
  pollForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const selectedOptions = Array.from(document.querySelectorAll('.poll-option.selected'));
    if (selectedOptions.length === 0) {
      alert("Pick at least one option!");
      return;
    }
  
    const selectedTeam = document.querySelector('input[name="team"]:checked').value;
  
    for (let optionDiv of selectedOptions) {
      const voteRef = doc(db, "votes", `${selectedTeam}_${optionDiv.dataset.value}`);
      await runTransaction(db, async (transaction) => {
        const voteDoc = await transaction.get(voteRef);
        if (!voteDoc.exists()) {
          transaction.set(voteRef, { count: 1 });
        } else {
          transaction.update(voteRef, { count: voteDoc.data().count + 1 });
        }
      });
  
      // Optional: unselect after voting
      optionDiv.classList.remove('selected');
    }
  
    showResults();
  });

  async function showResults() {
  const snapshot = await getDocs(collection(db, "votes"));

  // Friendly names for the options
  const optionNames = {
    1: "Skoolzy’s Peg Board Set",
    2: "Schylling’s Wooden Stacking Robots",
    3: "Green Toys Dump Truck",
    4: "Melissa & Doug Pet Vet Play Set",
    5: "DUPLO Interactive Adventure Train",
    6: "Lakeshore Play & Explore Rocket"
  };

  // Organize votes by team
  let results = { G: {}, L: {} };
  snapshot.forEach(docSnap => {
    const [team, option] = docSnap.id.split('_'); // e.g., "G_1"
    results[team][option] = docSnap.data().count;
  });

  // Determine max votes for scaling
  const maxVotes = Math.max(
    ...Object.values(results.G),
    ...Object.values(results.L),
    1 // prevent divide by zero
  );

  // Build bars for a team
  function buildBars(teamData, team) {
    let html = "";
    for (let i = 1; i <= 6; i++) {
      const count = teamData[i] || 0;
      const width = (count / maxVotes) * 100;

      html += `
        <div class="option-label">${optionNames[i]} (${count})</div>
        <div class="bar-container">
          <div class="bar ${team}" style="width: ${width}%"></div>
        </div>
      `;
    }
    return html;
  }

  // Insert bars into the DOM
  document.getElementById('resultsG').innerHTML = buildBars(results.G, 'G');
  document.getElementById('resultsL').innerHTML = buildBars(results.L, 'L');
}

  // Display live results on page load
  showResults();
</script>

</body>
</html>
